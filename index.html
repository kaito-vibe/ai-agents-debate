    // ═══════════════════════════════════════════
    // API HELPERS
    // ═══════════════════════════════════════════
    const isAnthropic = (url) => url.includes("api.anthropic.com");
    const isOpenAI = (url) => url.includes("api.openai.com");
    const isGoogle = (url) => url.includes("generativelanguage.googleapis.com");

    function buildPayload(baseUrl, model, system, msgs, maxTokens, temperature) {
      if (isAnthropic(baseUrl)) {
        // Anthropic Messages API format
        const payload = { model, system, messages: msgs, max_tokens: maxTokens };
        if (temperature !== undefined && temperature !== null) payload.temperature = temperature;
        return payload;
      }
      if (isGoogle(baseUrl)) {
        // Google Gemini format
        const googleMsgs = msgs.map(m => ({
          role: m.role === "assistant" ? "model" : "user",
          parts: [{ text: m.content }]
        }));
        const payload = {
          contents: googleMsgs,
          systemInstruction: { parts: [{ text: system }] },
          generationConfig: { maxOutputTokens: maxTokens }
        };
        if (temperature !== undefined && temperature !== null) payload.generationConfig.temperature = temperature;
        return payload;
      }
      // OpenAI-compatible format
      const tokenParam = isOpenAI(baseUrl) ? "max_completion_tokens" : "max_tokens";
      const payload = { model, messages: [{ role: "system", content: system }, ...msgs], [tokenParam]: maxTokens };
      if (temperature !== undefined && temperature !== null) payload.temperature = temperature;
      return payload;
    }
    function buildHeaders(apiKey, baseUrl) {
      if (isGoogle(baseUrl)) {
        return { "Content-Type": "application/json" };
      }
      if (isAnthropic(baseUrl)) {
        return { "Content-Type": "application/json", "x-api-key": apiKey, "anthropic-version": "2023-06-01" };
      }
      return { "Content-Type": "application/json", "Authorization": "Bearer " + apiKey };
    }
    function getEndpoint(baseUrl, model, apiKey) {
      if (isGoogle(baseUrl)) return baseUrl + "/models/" + model + ":generateContent?key=" + apiKey;
      if (isAnthropic(baseUrl)) return baseUrl + "/messages";
      return baseUrl + "/chat/completions";
    }
    function getStreamEndpoint(baseUrl, model, apiKey) {
      if (isGoogle(baseUrl)) return baseUrl + "/models/" + model + ":streamGenerateContent?alt=sse&key=" + apiKey;
      return getEndpoint(baseUrl, model, apiKey);
    }
    function extractContent(baseUrl, data) {
      if (isGoogle(baseUrl)) {
        if (data.error) throw new Error(data.error.message || JSON.stringify(data.error));
        return data.candidates?.[0]?.content?.parts?.map(p => p.text || "").join("") || "";
      }
      if (isAnthropic(baseUrl)) {
        if (data.error) throw new Error(data.error.message || JSON.stringify(data.error));
        return (data.content || []).map(b => b.text || "").join("");
      }
      if (data.error) throw new Error(data.error.message || JSON.stringify(data.error));
      if (!data.choices || !data.choices[0]?.message) throw new Error("Unexpected API response format");
      return data.choices[0].message.content;
    }

    async function fetchWikiImage(profileUrl, personName) {
      const tryTitle = async (title) => {
        try {
          const clean = title.replace(/ /g, "_");
          const res = await fetch("https://en.wikipedia.org/api/rest_v1/page/summary/" + encodeURIComponent(clean));
          if (!res.ok) return null;
          const data = await res.json();
          return data.thumbnail?.source || data.originalimage?.source || null;
        } catch (_) { return null; }
      };
      // Try from profileUrl first
      if (profileUrl && profileUrl.includes("wikipedia.org/wiki/")) {
        const title = decodeURIComponent(profileUrl.split("/wiki/")[1].split("#")[0].split("?")[0]);
        const img = await tryTitle(title);
        if (img) return img;
      }
      // Fallback: try the person's name directly
      if (personName) {
        const img = await tryTitle(personName);
        if (img) return img;
      }
      return null;
    }

    async function callAPI(apiKey, baseUrl, model, system, msgs, maxTokens, temperature) {
      const apiUrl = getEndpoint(baseUrl, model, apiKey);
      const payload = buildPayload(baseUrl, model, system, msgs, maxTokens, temperature);
      const apiHeaders = buildHeaders(apiKey, baseUrl);
      const proxyRes = await fetch("/api/proxy", { method: "POST", headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ url: apiUrl, headers: apiHeaders, body: payload }) });
      if (!proxyRes.ok) {
        const errBody = await proxyRes.json().catch(() => null);
        const errMsg = errBody?.error?.message || errBody?.message || ("API error " + proxyRes.status);
        throw new Error(errMsg);
      }
      const d = await proxyRes.json(); return extractContent(baseUrl, d);
    }

    async function callAPIStream(apiKey, baseUrl, model, system, msgs, maxTokens, temperature, onChunk) {
      const apiUrl = getStreamEndpoint(baseUrl, model, apiKey);
      const payload = buildPayload(baseUrl, model, system, msgs, maxTokens, temperature);
      const apiHeaders = buildHeaders(apiKey, baseUrl);
      const response = await fetch("/api/proxy-stream", { method: "POST", headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ url: apiUrl, headers: apiHeaders, body: payload }) });
      if (!response.ok) {
        const err = await response.json().catch(() => ({ error: { message: "Stream failed" } }));
        throw new Error(err.error?.message || "Stream request failed");
      }
      const reader = response.body.getReader();
      const decoder = new TextDecoder();
      let fullText = "", buffer = "";
      const anthropic = isAnthropic(baseUrl);
      const google = isGoogle(baseUrl);
      while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        buffer += decoder.decode(value, { stream: true });
        const lines = buffer.split("\n");
        buffer = lines.pop();
        for (const line of lines) {
          const t = line.trim();
          if (!t || t === "data: [DONE]") continue;
          if (t.startsWith("data: ")) {
            try {
              const j = JSON.parse(t.slice(6));
              let delta = "";
              if (google) {
                // Google SSE: candidates[0].content.parts[0].text
                delta = j.candidates?.[0]?.content?.parts?.[0]?.text || "";
              } else if (anthropic) {
                // Anthropic SSE: content_block_delta events with delta.text
                if (j.type === "content_block_delta") delta = j.delta?.text || "";
              } else {
                // OpenAI SSE: choices[0].delta.content
                delta = j.choices?.[0]?.delta?.content || "";
              }
              if (delta) { fullText += delta; onChunk(fullText); }
            } catch (_) {}
          }
        }
      }
      if (!fullText) throw new Error("No content received");
      return fullText;
    }

        for (const s of neutralSide) {
          const { idx, ...rest } = s;
          if (li < half) { newSeats[li++] = rest; }
          else if (ri < seats.length) { newSeats[ri++] = rest; }
        }
        setSeats(newSeats);
      };
      const openEdit = (i) => {
        if (loading) return;
        const s = seats[i];
        setEditForm(s ? { name: s.name, title: s.title, instructions: s.instructions, temperature: s.temperature !== undefined ? s.temperature : DEFAULT_TEMP, provider: s.provider || "", model: s.model || "" }
          : { name: "", title: "", instructions: "", temperature: DEFAULT_TEMP, provider: "", model: "" });
        setModalError(""); setShowPersonaPicker(false); setEditingSeat(i);
      };
      const pickPersona = (p) => {
        // Pick persona but don't set provider/model (those are seat-specific)
        setEditForm(f => ({ ...f, name: p.name, title: p.title, instructions: p.instructions, temperature: p.temperature !== undefined ? p.temperature : DEFAULT_TEMP }));
        setShowPersonaPicker(false);
      };

      const LENGTH_KEYS = Object.keys(LENGTHS);
      const LENGTH_COLORS = { mini: "#6b7280", short: "#3b82f6", medium: "#10b981", long: "#f59e0b" };


      // ═══════════════════════════════════════════
      // HOME PAGE
      // ═══════════════════════════════════════════
      if (page === "home") {
        return (
          <div className="h-screen flex flex-col items-center justify-center bg-gradient-to-br from-slate-950 via-slate-900 to-emerald-950 text-slate-100 anim-fade">
            <div className="text-center mb-12">
              <div className="flex items-center justify-center gap-3 mb-3"><IcoSparkles size={40} className="text-amber-400" /></div>
              <h1 className="text-4xl font-bold mb-2 bg-gradient-to-r from-amber-400 to-emerald-400 bg-clip-text text-transparent">AI Agents Debate</h1>
              <p className="text-slate-500 text-sm">Configure personas, run debates, generate insights</p>
            </div>
            {showRecovery && recoveryData && (
              <div className="mb-6 w-80 p-4 rounded-2xl bg-amber-500/10 border border-amber-500/25 anim-fade">
                <div className="flex items-center gap-2 mb-2"><IcoRotate size={15} className="text-amber-400" /><span className="text-sm font-semibold text-amber-300">Unsaved session found</span></div>
                <div className="text-xs text-slate-400 mb-3">
                  {recoveryData.state.topic && <span>Topic: {recoveryData.state.topic} · </span>}
                  {(recoveryData.state.messages || []).length} messages · {new Date(recoveryData.savedAt).toLocaleString()}
                </div>
                <div className="flex gap-2">
                  <button onClick={recoverAutosave} className="flex-1 px-3 py-2 rounded-xl bg-amber-600/80 hover:bg-amber-500 text-xs font-semibold transition-colors">Resume</button>
                  <button onClick={() => setShowRecovery(false)} className="px-3 py-2 rounded-xl bg-slate-700/60 hover:bg-slate-700 text-xs text-slate-400 transition-colors">Dismiss</button>
                </div>
              </div>
            )}
            <div className="flex flex-col gap-3 w-72">
              <button onClick={startNewDebate} className="flex items-center gap-3 px-6 py-4 rounded-2xl bg-amber-600/90 hover:bg-amber-500 transition-all text-left group glow">
                <IcoSparkles size={22} className="group-hover:scale-110 transition-transform" />
                <div><div className="font-semibold">New Debate</div><div className="text-xs text-amber-200/60">Run an AI-powered debate battle</div></div>
              </button>
              <button onClick={() => { refreshConversations(); setPage("conversations"); }} className="flex items-center gap-3 px-6 py-4 rounded-2xl bg-slate-700/60 hover:bg-slate-700 transition-all text-left group">
                <IcoFolder size={22} className="text-blue-400 group-hover:scale-110 transition-transform" />
                <div><div className="font-semibold">Debate History</div><div className="text-xs text-slate-400">Load a saved debate or meeting</div></div>
              </button>
              <button onClick={() => { refreshPersonas(); setPage("settings"); }} className="flex items-center gap-3 px-6 py-4 rounded-2xl bg-slate-700/60 hover:bg-slate-700 transition-all text-left group">
                <IcoSettings size={22} className="text-amber-400 group-hover:scale-110 transition-transform" />
                <div><div className="font-semibold">Settings</div><div className="text-xs text-slate-400">API keys, models, personas</div></div>
              </button>
              <button onClick={() => window.close()} className="flex items-center gap-3 px-6 py-4 rounded-2xl bg-slate-800/40 hover:bg-slate-800 transition-all text-left text-slate-500 group">
                <IcoX size={22} className="group-hover:scale-110 transition-transform" /><div><div className="font-semibold">Exit</div></div>
              </button>
            </div>
            <div className="mt-8 text-[10px] text-slate-700">v2.1 — Your API keys stay local</div>
          </div>
        );
      }

      // ═══════════════════════════════════════════
      // SETTINGS PAGE (with persona editing)
      // ═══════════════════════════════════════════
      if (page === "settings") {
        return (
          <div className="h-screen flex flex-col bg-gradient-to-br from-slate-950 via-slate-900 to-slate-950 text-slate-100 anim-fade">
            <div className="flex items-center gap-3 px-6 py-4 border-b border-slate-700/40">
              <button onClick={() => setPage("home")} className="p-2 rounded-lg hover:bg-slate-700/60 transition-colors"><IcoArrow size={18} /></button>
              <h2 className="text-lg font-bold">Settings</h2>
            </div>
            <div className="flex-1 overflow-y-auto p-6 max-w-xl mx-auto w-full space-y-6">
              <div>
                <h3 className="text-sm font-semibold mb-3 text-slate-300">API Configuration</h3>
                <div className="space-y-3">
                  {Object.entries(PROVIDERS).map(([url, p]) => (
                    <div key={url}><label className="text-[10px] text-slate-500 uppercase tracking-wider mb-1 block">{p.label} API Key</label>
                      <input type="password" value={apiKeys[url] || ""} onChange={e => setApiKeys(k => ({...k, [url]: e.target.value}))} placeholder={p.label === "OpenAI" ? "sk-..." : p.label === "Anthropic" ? "sk-ant-..." : "AI..."} className="w-full bg-slate-700/50 rounded-lg px-3 py-2.5 text-sm outline-none focus:ring-1 focus:ring-emerald-500/40" /></div>
                  ))}
                  <div><label className="text-[10px] text-slate-500 uppercase tracking-wider mb-1 block">Default Provider</label>
                    <select value={defaultProvider} onChange={e => { setDefaultProvider(e.target.value); setDefaultModel(PROVIDERS[e.target.value]?.default || ""); }} className="w-full bg-slate-700/50 rounded-lg px-3 py-2.5 text-sm outline-none cursor-pointer">
                      {Object.entries(PROVIDERS).map(([u, p]) => <option key={u} value={u}>{p.label}</option>)}
                    </select></div>
                  <div><label className="text-[10px] text-slate-500 uppercase tracking-wider mb-1 block">Default Model</label>
                    <select value={PROVIDERS[defaultProvider]?.models.some(m => m.value === defaultModel) ? defaultModel : "__custom"} onChange={e => { if (e.target.value !== "__custom") setDefaultModel(e.target.value); }} className="w-full bg-slate-700/50 rounded-lg px-3 py-2.5 text-sm outline-none cursor-pointer">
                      {(PROVIDERS[defaultProvider]?.models || []).map(m => <option key={m.value} value={m.value}>{m.label}</option>)}
                      <option value="__custom">Custom...</option>
                    </select>
                    {!(PROVIDERS[defaultProvider]?.models.some(m => m.value === defaultModel)) && (
                      <input type="text" value={defaultModel} onChange={e => setDefaultModel(e.target.value)} placeholder="Model name..." className="w-full bg-slate-700/50 rounded-lg px-3 py-2.5 text-sm outline-none focus:ring-1 focus:ring-emerald-500/40 mt-2" />
                    )}</div>
                  <div><label className="text-[10px] text-slate-500 uppercase tracking-wider mb-1 block">Default Answer Length</label>
                    <select value={answerLength} onChange={e => setAnswerLength(e.target.value)} className="w-full bg-slate-700/50 rounded-lg px-3 py-2.5 text-sm outline-none cursor-pointer">
                      {Object.entries(LENGTHS).map(([k, v]) => <option key={k} value={k}>{v.label} — {v.prompt}</option>)}
                    </select></div>
                  <div className="flex items-center gap-3">
                    <label className="text-[10px] text-slate-500 uppercase tracking-wider">Auto-update context after rounds</label>
                    <button onClick={() => setAutoUpdateContext(!autoUpdateContext)}
                      className={"w-10 h-5 rounded-full transition-colors relative " + (autoUpdateContext ? "bg-emerald-600" : "bg-slate-600")}>
                      <div className={"w-4 h-4 rounded-full bg-white absolute top-0.5 transition-all " + (autoUpdateContext ? "left-5.5" : "left-0.5")} style={{ left: autoUpdateContext ? 22 : 2 }} />
                    </button>
                  </div>
                </div>
              </div>
              <div>
                <div className="flex items-center justify-between mb-3">
                  <h3 className="text-sm font-semibold text-slate-300">Personas Library ({personas.length})</h3>
                </div>
                {personas.length === 0 ? (
                  <div className="text-center text-slate-600 py-6 text-sm">Personas you create in meetings will appear here for reuse</div>
                ) : (
                  <div className="space-y-2">
                    {personas.map(p => (
                      <div key={p.id} className="flex items-center gap-3 p-3 rounded-xl bg-slate-800/60 group">
                        <div className="w-9 h-9 rounded-full bg-emerald-600/30 flex items-center justify-center text-emerald-400 text-xs font-bold flex-shrink-0">
                          {p.name.split(" ").map(n => n[0]).join("").slice(0,2).toUpperCase()}
                        </div>
                        <div className="flex-1 min-w-0 cursor-pointer" onClick={() => { setEditPersonaForm({ name: p.name, title: p.title, instructions: p.instructions, temperature: p.temperature || DEFAULT_TEMP }); setEditingPersona(p.id); }}>
                          <div className="text-sm font-semibold truncate">{p.name}</div>
                          <div className="text-[11px] text-slate-500 truncate">{p.title}</div>
                        </div>
                        <button onClick={() => { setEditPersonaForm({ name: p.name, title: p.title, instructions: p.instructions, temperature: p.temperature || DEFAULT_TEMP }); setEditingPersona(p.id); }}
                          className="p-1.5 rounded-lg text-slate-600 hover:text-blue-400 hover:bg-blue-500/10 opacity-0 group-hover:opacity-100 transition-all"><IcoEdit size={14} /></button>
                        <button onClick={() => deletePersona(p.id)}
                          className="p-1.5 rounded-lg text-slate-600 hover:text-red-400 hover:bg-red-500/10 opacity-0 group-hover:opacity-100 transition-all"><IcoTrash size={14} /></button>
                      </div>
                    ))}
                  </div>
                )}
              </div>
              <div className="text-xs text-slate-600">Settings auto-save. Your API key is stored locally on your machine only.</div>
            </div>

            {/* Persona Edit Modal */}
            {editingPersona !== null && (
              <div className="fixed inset-0 bg-black/50 backdrop-blur-sm flex items-center justify-center z-50 anim-fade-fast" onClick={() => setEditingPersona(null)}>
                <div className="bg-slate-800 rounded-2xl p-5 w-full max-w-md mx-4 shadow-2xl border border-slate-700/50" onClick={e => e.stopPropagation()}>
                  <div className="flex items-center justify-between mb-4">
                    <h3 className="font-bold flex items-center gap-2"><IcoEdit size={16} className="text-blue-400" /> Edit Persona</h3>
                    <button onClick={() => setEditingPersona(null)} className="text-slate-400 hover:text-white"><IcoX size={18} /></button>
                  </div>
                  <div className="space-y-3">
                    <div><label className="text-[10px] text-slate-500 uppercase tracking-wider mb-1 block">Name</label>
                      <input type="text" value={editPersonaForm.name} onChange={e => setEditPersonaForm(f => ({...f, name: e.target.value}))} className="w-full bg-slate-700/60 rounded-lg px-3 py-2 text-sm outline-none focus:ring-1 focus:ring-emerald-500/30" /></div>
                    <div><label className="text-[10px] text-slate-500 uppercase tracking-wider mb-1 block">Title / Role</label>
                      <input type="text" value={editPersonaForm.title} onChange={e => setEditPersonaForm(f => ({...f, title: e.target.value}))} className="w-full bg-slate-700/60 rounded-lg px-3 py-2 text-sm outline-none focus:ring-1 focus:ring-emerald-500/30" /></div>
                    <div><label className="text-[10px] text-slate-500 uppercase tracking-wider mb-1 block">Instructions</label>
                      <textarea value={editPersonaForm.instructions} onChange={e => setEditPersonaForm(f => ({...f, instructions: e.target.value}))} rows={10} className="w-full bg-slate-700/60 rounded-lg px-3 py-2 text-sm outline-none resize-y focus:ring-1 focus:ring-emerald-500/30 min-h-[160px] max-h-[400px]" /></div>
                    <div>
                      <div className="flex items-center justify-between mb-1">
                        <label className="text-[10px] text-slate-500 uppercase tracking-wider">Temperature</label>
                        <span className="text-[11px] text-slate-400 font-mono">{editPersonaForm.temperature.toFixed(1)}</span>
                      </div>
                      <input type="range" min="0" max="2" step="0.1" value={editPersonaForm.temperature} onChange={e => setEditPersonaForm(f => ({...f, temperature: parseFloat(e.target.value)}))} className="w-full" />
                      <div className="flex justify-between text-[9px] text-slate-600 mt-0.5"><span>Focused</span><span>Balanced</span><span>Creative</span></div>
                    </div>
                  </div>
                  <div className="flex gap-2 mt-4 justify-end">
                    <button onClick={() => setEditingPersona(null)} className="px-4 py-2 rounded-lg bg-slate-700 hover:bg-slate-600 text-sm">Cancel</button>
                    <button onClick={updatePersonaFromForm} disabled={!editPersonaForm.name.trim()} className="px-4 py-2 rounded-lg bg-emerald-600 hover:bg-emerald-500 disabled:opacity-30 text-sm font-semibold">Save</button>
                  </div>
                </div>
              </div>
            )}
          </div>
        );
      }

      // ═══════════════════════════════════════════
      // HISTORY PAGE (Debates + Meetings, tabbed)
      // ═══════════════════════════════════════════
      if (page === "conversations") {
        // Helpers
        const relTime = (iso) => {
          const s = (Date.now() - new Date(iso)) / 1000;
          if (s < 60) return "just now";
          if (s < 3600) return Math.round(s / 60) + "m ago";
          if (s < 86400) return Math.round(s / 3600) + "h ago";
          if (s < 604800) return Math.round(s / 86400) + "d ago";
          return new Date(iso).toLocaleDateString();
        };
        const Sparkline = ({ data, w = 80, h = 22 }) => {
          if (!data || data.length < 2) return (
            <svg width={w} height={h}><line x1="0" y1={h/2} x2={w} y2={h/2} stroke="#475569" strokeWidth="1" strokeDasharray="3,2"/></svg>
          );
          const vals = data.map(d => d.s !== undefined ? d.s : 50);
          const pts = vals.map((v, i) => ((i / (vals.length - 1)) * w).toFixed(1) + "," + (h - (v / 100) * h).toFixed(1)).join(" ");
          const last = vals[vals.length - 1];
          const col = last > 55 ? "#22c55e" : last < 45 ? "#ef4444" : "#94a3b8";
          return (
            <svg width={w} height={h} style={{ overflow: "visible" }}>
              <line x1="0" y1={h/2} x2={w} y2={h/2} stroke="#334155" strokeWidth="0.5" strokeDasharray="2,2"/>
              <polyline points={pts} fill="none" stroke={col} strokeWidth="2" strokeLinejoin="round" strokeLinecap="round"/>
              <circle cx={parseFloat(pts.split(" ").pop().split(",")[0])} cy={parseFloat(pts.split(" ").pop().split(",")[1])} r="2.5" fill={col}/>
            </svg>
          );
        };
        const getVerdict = (c) => {
          if (!c.debateScore && c.debateScore !== 0) return null;
          const s = c.debateScore;
          if (s > 55) return { label: "YES won", color: "#22c55e", bg: "rgba(34,197,94,0.12)" };
          if (s < 45) return { label: "NO won", color: "#ef4444", bg: "rgba(239,68,68,0.12)" };
          return { label: "Draw", color: "#94a3b8", bg: "rgba(148,163,184,0.12)" };
        };

        // Filter logic
        const debates = conversations.filter(c => c.simMode === "debate");
        const meetings = conversations.filter(c => c.simMode !== "debate");
        const completed = debates.filter(c => c.finished);
        const inProgress = debates.filter(c => !c.finished && c.messageCount > 0);

        let tabItems = conversations;
        if (historyFilter === "debates") tabItems = debates;
        else if (historyFilter === "meetings") tabItems = meetings;
        else if (historyFilter === "completed") tabItems = completed;
        else if (historyFilter === "in-progress") tabItems = inProgress;

        const searchFiltered = convSearch.trim()
          ? tabItems.filter(c =>
              (c.name || "").toLowerCase().includes(convSearch.toLowerCase()) ||
              (c.topic || "").toLowerCase().includes(convSearch.toLowerCase()))
          : tabItems;

        // Stats for debates
        const avgScore = debates.length > 0
          ? Math.round(debates.filter(c => c.debateScore != null).reduce((a, c) => a + c.debateScore, 0) / Math.max(1, debates.filter(c => c.debateScore != null).length))
          : 50;
        const forWins = completed.filter(c => c.debateScore > 55).length;

        const TABS = [
          { id: "all",         label: "All",        count: conversations.length },
          { id: "completed",   label: "Completed",  count: completed.length },
          { id: "in-progress", label: "In Progress", count: inProgress.length },
        ];

        return (
          <div className="h-screen flex flex-col bg-gradient-to-br from-slate-950 via-slate-900 to-slate-950 text-slate-100 anim-fade">
            {/* Header */}
            <div className="flex items-center gap-3 px-5 py-3.5 border-b border-slate-700/40 flex-shrink-0">
              <button onClick={() => { setPage("home"); setConvSearch(""); setConfirmDeleteFile(null); }} className="p-1.5 rounded-lg hover:bg-slate-700/60 transition-colors flex-shrink-0"><IcoArrow size={16} /></button>
              <div className="flex items-center gap-2 bg-slate-700/40 rounded-lg px-2.5 py-1.5 flex-1">
                <IcoSearch size={13} className="text-slate-500 flex-shrink-0" />
                <input type="text" value={convSearch} onChange={e => setConvSearch(e.target.value)} placeholder="Search…" className="bg-transparent text-sm outline-none flex-1 placeholder-slate-500 min-w-0" />
                {convSearch && <button onClick={() => setConvSearch("")} className="text-slate-500"><IcoX size={12} /></button>}
              </div>
              <button onClick={startNewDebate} className="flex items-center gap-1.5 px-3 py-1.5 rounded-lg bg-amber-600/80 hover:bg-amber-500 text-xs font-semibold transition-colors flex-shrink-0">
                <IcoSparkles size={13} /> New Debate
              </button>
            </div>

            {/* Tabs */}
            <div className="flex items-center gap-0.5 px-5 pt-3 pb-0 flex-shrink-0 border-b border-slate-700/30">
              {TABS.map(tab => (
                <button key={tab.id} onClick={() => setHistoryFilter(tab.id)}
                  className={"px-3 py-1.5 text-xs font-semibold rounded-t-lg transition-colors border-b-2 " +
                    (historyFilter === tab.id
                      ? "border-amber-500 text-amber-300 bg-amber-500/10"
                      : "border-transparent text-slate-500 hover:text-slate-300")}>
                  {tab.label} <span className={"ml-1 text-[10px] px-1.5 py-0.5 rounded-full " + (historyFilter === tab.id ? "bg-amber-500/30 text-amber-200" : "bg-slate-700/60 text-slate-500")}>{tab.count}</span>
                </button>
              ))}
            </div>

            <div className="flex-1 overflow-y-auto">
              <div className="max-w-3xl mx-auto w-full px-5 pt-4 pb-6">

                {/* Debates stats summary (shown for all/debates/completed tabs) */}
                {(historyFilter === "all" || historyFilter === "debates" || historyFilter === "completed") && debates.length > 0 && (
                  <div className="grid grid-cols-4 gap-2.5 mb-5">
                    {[
                      { v: debates.length, label: "Debates", color: "text-amber-300" },
                      { v: completed.length, label: "Completed", color: "text-emerald-300" },
                      { v: completed.length > 0 ? forWins + "W / " + (completed.length - forWins - completed.filter(c => c.debateScore >= 45 && c.debateScore <= 55).length) + "L" : "—", label: "YES / NO Wins", color: "text-slate-200" },
                      { v: debates.filter(c => c.debateScore != null).length > 0 ? avgScore + "/100" : "—", label: "Avg Score", color: "text-slate-200" },
                    ].map((s, i) => (
                      <div key={i} className="bg-slate-800/50 rounded-xl p-3 text-center border border-slate-700/30">
                        <div className={"text-xl font-bold " + s.color}>{s.v}</div>
                        <div className="text-[10px] text-slate-500 mt-0.5">{s.label}</div>
                      </div>
                    ))}
                  </div>
                )}

                {/* Cards */}
                {searchFiltered.length === 0 ? (
                  <div className="text-center py-20">
                    <IcoMsg size={38} className="mx-auto text-slate-700 mb-3" />
                    <div className="text-slate-500">{convSearch ? ('No results matching "' + convSearch + '"') : "Nothing here yet"}</div>
                  </div>
                ) : (
                  <div className="space-y-2.5">
                    {searchFiltered.map(c => {
                      const isDebate = c.simMode === "debate";
                      const verdict = isDebate ? getVerdict(c) : null;
                      const accentColor = isDebate
                        ? (c.finished ? (c.debateScore > 55 ? "#22c55e" : c.debateScore < 45 ? "#ef4444" : "#94a3b8") : "#f59e0b")
                        : "#10b981";
                      return (
                        <div key={c.filename}
                          className="flex gap-0 rounded-2xl bg-slate-800/50 hover:bg-slate-800/80 transition-all cursor-pointer group overflow-hidden border border-slate-700/30 hover:border-slate-600/50"
                          onClick={() => loadConversation(c.filename)}>
                          {/* Left color accent strip */}
                          <div className="w-1 flex-shrink-0" style={{ backgroundColor: accentColor + "88" }} />
                          <div className="flex-1 flex items-start gap-3 p-3.5 min-w-0">
                            {/* Icon */}
                            <div className="w-9 h-9 rounded-xl flex items-center justify-center flex-shrink-0 mt-0.5"
                              style={{ backgroundColor: accentColor + "1a" }}>
                              {isDebate ? <IcoSparkles size={18} style={{ color: accentColor }} /> : <IcoMsg size={18} style={{ color: accentColor }} />}
                            </div>
                            {/* Main content */}
                            <div className="flex-1 min-w-0">
                              <div className="flex items-center gap-2 mb-0.5 flex-wrap">
                                <span className="font-semibold text-slate-100 truncate">{c.name}</span>
                                {isDebate && (
                                  c.finished ? (
                                    <span className="text-[10px] px-1.5 py-0.5 rounded-full font-bold flex-shrink-0 flex items-center gap-0.5"
                                      style={{ color: verdict?.color, backgroundColor: verdict?.bg }}>
                                      ✓ {verdict?.label} {c.debateScore != null ? "(" + c.debateScore + "%)" : ""}
                                    </span>
                                  ) : c.messageCount > 0 ? (
                                    <span className="text-[10px] px-1.5 py-0.5 rounded-full bg-amber-500/15 text-amber-400 font-medium flex-shrink-0">⟳ In Progress</span>
                                  ) : (
                                    <span className="text-[10px] px-1.5 py-0.5 rounded-full bg-slate-700/60 text-slate-500 flex-shrink-0">Setup</span>
                                  )
                                )}
                              </div>
                              {c.topic && <div className="text-xs text-slate-400 truncate mb-1">{c.topic}</div>}
                              {c.summaryPreview && c.finished && <div className="text-[11px] text-slate-500 italic truncate mb-1">{c.summaryPreview}</div>}
                              <div className="flex items-center gap-3 text-[10px] text-slate-600 flex-wrap">
                                <span>{c.participantCount} agents</span>
                                <span>{c.messageCount} msg{c.messageCount !== 1 ? "s" : ""}</span>
                                {isDebate && c.debateRound > 0 && <span>{c.debateRound} round{c.debateRound !== 1 ? "s" : ""}</span>}
                                <span className="text-slate-700">{relTime(c.savedAt)}</span>
                              </div>
                            </div>
                            {/* Right side: sparkline + mini score bar */}
                            {isDebate && (
                              <div className="flex flex-col items-end gap-1.5 flex-shrink-0 ml-2">
                                {c.scoreHistory && c.scoreHistory.length >= 2 && (
                                  <Sparkline data={c.scoreHistory} w={72} h={22} />
                                )}
                                {c.debateScore != null && c.debateScoreCount > 0 && (
                                  <div className="w-[72px] h-2 rounded-full overflow-hidden bg-slate-700/50">
                                    <div className="h-full rounded-full transition-all duration-500"
                                      style={{
                                        width: c.debateScore + "%",
                                        backgroundColor: c.debateScore > 55 ? "#22c55e" : c.debateScore < 45 ? "#ef4444" : "#94a3b8"
                                      }} />
                                  </div>
                                )}
                              </div>
                            )}
                          </div>
                          {/* Delete button */}
                          <div className="flex items-center pr-2 flex-shrink-0" onClick={e => e.stopPropagation()}>
                            {confirmDeleteFile === c.filename ? (
                              <div className="flex items-center gap-1">
                                <button onClick={() => deleteConversation(c.filename)} className="px-2 py-1 rounded-lg bg-red-500/20 text-red-400 hover:bg-red-500/30 text-xs font-semibold">Yes</button>
                                <button onClick={() => setConfirmDeleteFile(null)} className="px-2 py-1 rounded-lg bg-slate-700 text-slate-400 hover:bg-slate-600 text-xs">No</button>
                              </div>
                            ) : (
                              <button onClick={e => { e.stopPropagation(); setConfirmDeleteFile(c.filename); }}
                                className="p-1.5 rounded-lg text-slate-700 hover:text-red-400 hover:bg-red-500/10 opacity-0 group-hover:opacity-100 transition-all">
                                <IcoTrash size={14} />
                              </button>
                            )}
                          </div>
                        </div>
                      );
                    })}
                  </div>
                )}
              </div>
            </div>
          </div>
        );
      }

      // ═══════════════════════════════════════════
      // DEBATE SETUP PAGE
      // ═══════════════════════════════════════════
      if (page === "debate-setup") {
        const generatePersonaSuggestions = async () => {
          const cfg = getAgentConfig(null);
          if (!cfg.apiKey) { setError("Set API key in Settings first"); return; }
          if (!topic.trim()) { setError("Enter a topic first"); return; }
          setError(""); setGeneratingSuggestions(true); setPersonaSuggestions([]);
          try {
            const isSides = debateFormat === "sides";
            const prompt = `You are casting the ideal 16-person debate panel for: "${topic.trim()}"

Return a JSON array of EXACTLY 16 personas — the most interesting, diverse, high-contrast panel possible.
${isSides ? "Balance: 6 FOR + 6 AGAINST + 2 NEUTRAL + 2 WILDCARD/SPECIALIST." : "Balance: 16 diverse perspectives covering the full spectrum of opinion, background, and style."}

IMPORTANT: Where relevant, cast REAL well-known public figures (politicians, CEOs, academics, activists, authors, journalists) who are known to have strong views on this topic or adjacent topics. For real people, provide their Wikipedia URL and a direct image URL. For fictional archetypes, set those fields to null.

For each persona write COMPREHENSIVE, RICH instructions — 4 detailed paragraphs:
1. WHO they are: full background, career history, life experience, personality, and what shaped their worldview
2. HOW they argue: rhetorical style, emotional register, logic patterns, typical tactics, verbal tics, what triggers them
3. WHAT they specifically believe about "${topic.trim()}" and WHY — their core position, their key evidence, their emotional stake
4. Their BLIND SPOTS and WEAKNESSES: where their argument breaks down, what they refuse to acknowledge, biases they can't see

JSON format — output ONLY the array, no markdown:
[{"name":"...","title":"...","instructions":"...","side":"for"|"against"|"neutral","archetype":"...","profileUrl":"https://en.wikipedia.org/wiki/Name or null"},...]

Return the array starting with [ and ending with ]. Nothing else.`;

            // Stream and incrementally parse persona objects as they arrive
            let extractedCount = 0;
            const onChunk = (fullText) => {
              // Try to extract complete JSON objects from partial stream
              try {
                const stripped = fullText.replace(/^```(?:json)?\s*/i, "").replace(/\s*```\s*$/i, "").trim();
                // Find all complete {...} objects by matching balanced braces
                let depth = 0, start = -1;
                const found = [];
                for (let i = 0; i < stripped.length; i++) {
                  if (stripped[i] === "{") { if (depth === 0) start = i; depth++; }
                  else if (stripped[i] === "}") { depth--; if (depth === 0 && start >= 0) { found.push(stripped.slice(start, i + 1)); start = -1; } }
                }
                // Parse each new object we haven't seen yet
                if (found.length > extractedCount) {
                  const previews = [];
                  for (let i = 0; i < found.length; i++) {
                    try {
                      const obj = JSON.parse(found[i]);
                      if (obj.name && obj.title) previews.push(obj);
                    } catch (_) {
                      // Partial object, skip — will try next chunk
                    }
                  }
                  if (previews.length > extractedCount) {
                    extractedCount = previews.length;
                    setPersonaSuggestions([...previews]);
                  }
                }
              } catch (_) {}
            };

            let result;
            try {
              result = await callAPIStream(cfg.apiKey, cfg.baseUrl, cfg.model,
                "Return only a valid JSON array. No markdown code blocks. No explanation. Start with [ and end with ].",
                [{ role: "user", content: prompt }], 8000, 0.85, onChunk);
            } catch (_) {
              // Fallback to non-streaming
              result = await callAPI(cfg.apiKey, cfg.baseUrl, cfg.model,
                "Return only a valid JSON array. No markdown code blocks. No explanation. Start with [ and end with ].",
                [{ role: "user", content: prompt }], 8000, 0.85);
            }

            // Final parse of the complete response
            let arr;
            try {
              const cleaned = result.replace(/^```(?:json)?\s*/i, "").replace(/\s*```\s*$/i, "").trim();
              arr = JSON.parse(cleaned);
            } catch (_) {
              try {
                const match = result.match(/\[[\s\S]*\]/);
                if (!match) throw new Error("no array found");
                arr = JSON.parse(match[0]);
              } catch (_2) {
                const match2 = result.match(/\[[\s\S]*\]/);
                if (!match2) throw new Error("Response did not contain a JSON array. Try again.");
                const fixed = match2[0].replace(/,\s*([}\]])/g, "$1").replace(/'/g, '"');
                arr = JSON.parse(fixed);
              }
            }
            if (!Array.isArray(arr) || arr.length === 0) throw new Error("Expected a non-empty array");
            const clean = arr.filter(p => p && p.name && p.title && p.instructions).slice(0, 16);
            if (clean.length === 0) throw new Error("Personas missing required fields");
            setPersonaSuggestions(clean);
            setSelectedSuggestions(new Set(clean.map((_, i) => i)));
            setShowSuggestions(true);
          } catch (e) { setError("Suggestion error: " + e.message); }
          setGeneratingSuggestions(false);
        };

        const addSelectedPersonas = () => {
          const toAdd = personaSuggestions.filter((_, i) => selectedSuggestions.has(i)).slice(0, 16);
          const newSeats = [...seats];
          for (const p of toAdd) {
            // Find best slot based on side
            let slot = -1;
            if (debateFormat === "sides") {
              const range = p.side === "against" ? [8, 16] : [0, 8];
              for (let i = range[0]; i < range[1]; i++) { if (!newSeats[i]) { slot = i; break; } }
              if (slot === -1) { for (let i = 0; i < 16; i++) { if (!newSeats[i]) { slot = i; break; } } }
            } else {
              for (let i = 0; i < 16; i++) { if (!newSeats[i]) { slot = i; break; } }
            }
            if (slot === -1) break;
            newSeats[slot] = { name: p.name, title: p.title, instructions: p.instructions, temperature: DEFAULT_TEMP, imageUrl: p.imageUrl || null, profileUrl: p.profileUrl || null, side: p.side || null };
          }
          setSeats(newSeats);
          setShowSuggestions(false);
          setPage("debate");
          // Fetch Wikipedia images in background — always prefer Wikipedia over AI-generated URLs
          newSeats.forEach((s, idx) => {
            if (s && s.profileUrl) {
              fetchWikiImage(s.profileUrl, s.name).then(url => {
                if (url) setSeats(prev => { const u = [...prev]; if (u[idx]) u[idx] = { ...u[idx], imageUrl: url }; return u; });
              });
            }
          });
        };

        return (
          <div className="h-screen flex flex-col items-center justify-center bg-gradient-to-br from-slate-950 via-slate-900 to-emerald-950 text-slate-100 anim-fade">
            <div className="text-center mb-8">
              <IcoSparkles size={40} className="text-amber-400 mx-auto mb-3" />
              <h1 className="text-3xl font-bold mb-2">Debate Setup</h1>
              <p className="text-slate-500 text-sm">Configure your debate topic and format</p>
            </div>
            <div className="w-96 space-y-6">
              <div><label className="text-sm font-semibold mb-2 block">Debate Topic</label>
                <input type="text" value={topic} onChange={e => setTopic(e.target.value)} placeholder="e.g. Should AI be regulated by governments?" className="w-full bg-slate-700/50 rounded-lg px-4 py-3 text-sm outline-none focus:ring-1 focus:ring-emerald-500/40 placeholder-slate-500" />
              </div>
              <div><label className="text-sm font-semibold mb-3 block">Debate Format</label>
                <div className="space-y-2">
                  <button onClick={() => setDebateFormat("sides")} className={"w-full p-4 rounded-2xl border-2 transition-all text-left " + (debateFormat === "sides" ? "bg-emerald-600/20 border-emerald-500" : "bg-slate-800/50 border-slate-700 hover:border-slate-600")}>
                    <div className="font-semibold">FOR vs AGAINST</div>
                    <div className="text-xs text-slate-400 mt-1">Left 6 seats argue FOR, right 6 argue AGAINST</div>
                  </button>
                  <button onClick={() => setDebateFormat("freeform")} className={"w-full p-4 rounded-2xl border-2 transition-all text-left " + (debateFormat === "freeform" ? "bg-emerald-600/20 border-emerald-500" : "bg-slate-800/50 border-slate-700 hover:border-slate-600")}>
                    <div className="font-semibold">Free-form</div>
                    <div className="text-xs text-slate-400 mt-1">Each participant has their own position</div>
                  </button>
                </div>
              </div>
              {error && <div className="text-xs text-red-400 bg-red-500/10 rounded-lg px-3 py-2">{error}</div>}

              {/* AI Persona Suggestions button */}
              <button onClick={generatePersonaSuggestions} disabled={!topic.trim() || generatingSuggestions}
                className="w-full flex items-center justify-center gap-2 px-4 py-3 rounded-2xl bg-purple-600/20 border border-purple-500/30 hover:bg-purple-600/30 disabled:opacity-30 transition-all text-sm font-semibold text-purple-300">
                <IcoSparkles size={16} />
                ✨ Suggest AI Personas for this topic
              </button>

              <div className="flex gap-3">
                <button onClick={() => setPage("home")} className="flex-1 px-6 py-3 rounded-2xl bg-slate-700/60 hover:bg-slate-700 transition-all">Cancel</button>
                <button onClick={() => { if (!topic.trim()) return; setPage("debate"); }} disabled={!topic.trim()} className="flex-1 px-6 py-3 rounded-2xl bg-emerald-600/90 hover:bg-emerald-500 disabled:opacity-30 transition-all font-semibold">Start Debate</button>
              </div>
            </div>

            {/* Generating personas overlay — live preview */}
            {generatingSuggestions && (
              <div className="fixed inset-0 bg-black/70 backdrop-blur-sm flex items-center justify-center z-50 anim-fade-fast p-4">
                <div className="bg-slate-900 rounded-2xl border border-slate-700/50 shadow-2xl w-full max-w-3xl flex flex-col" style={{ maxHeight: "88vh" }}>
                  <div className="px-5 py-4 border-b border-slate-700/50 flex items-center gap-3 flex-shrink-0">
                    <div className="w-6 h-6 rounded-full border-3 border-purple-500/30 border-t-purple-400 animate-spin flex-shrink-0" style={{ borderWidth: 3 }} />
                    <div className="flex-1">
                      <div className="font-bold text-purple-300">Casting debate panel…</div>
                      <div className="text-xs text-slate-500">{personaSuggestions.length} of 12 personas generated</div>
                    </div>
                    <div className="flex items-center gap-1">
                      {Array.from({ length: 12 }).map((_, i) => (
                        <div key={i} className={"w-2 h-2 rounded-full transition-all duration-300 " + (i < personaSuggestions.length ? "bg-purple-400 scale-110" : "bg-slate-700")} />
                      ))}
                    </div>
                  </div>
                  <div className="flex-1 overflow-y-auto p-4">
                    {personaSuggestions.length === 0 ? (
                      <div className="flex flex-col items-center justify-center py-12 text-slate-600 gap-3">
                        <IcoSparkles size={32} className="animate-pulse text-purple-500/40" />
                        <div className="text-sm">Analyzing topic and finding the best debaters…</div>
                      </div>
                    ) : (
                      <div className="grid grid-cols-2 gap-2">
                        {personaSuggestions.map((p, i) => (
                          <div key={i} className="flex gap-2.5 p-3 rounded-xl bg-slate-800/60 border border-slate-700/30 anim-fade">
                            <div className="flex-shrink-0 w-9 h-9 rounded-full overflow-hidden border border-slate-600/40 bg-slate-700">
                              {p.imageUrl ? (
                                <img src={p.imageUrl} alt={p.name} className="w-full h-full object-cover" onError={e => { e.target.style.display="none"; e.target.nextSibling.style.display="flex"; }} />
                              ) : null}
                              <div className={"w-full h-full items-center justify-center text-[10px] font-bold text-white " + (p.imageUrl ? "hidden" : "flex")}
                                style={{ backgroundColor: p.side === "for" ? "#16a34a" : p.side === "against" ? "#dc2626" : "#475569" }}>
                                {p.name.split(" ").map(n => n[0]).join("").slice(0,2).toUpperCase()}
                              </div>
                            </div>
                            <div className="flex-1 min-w-0">
                              <div className="flex items-center gap-1.5 mb-0.5 flex-wrap">
                                <span className="text-xs font-semibold text-slate-100">{p.name}</span>
                                <span className={"text-[9px] px-1.5 py-0.5 rounded-full font-bold " + (p.side === "for" ? "bg-green-500/20 text-green-400" : p.side === "against" ? "bg-red-500/20 text-red-400" : "bg-slate-600/50 text-slate-400")}>{p.side === "for" ? "FOR" : p.side === "against" ? "AGN" : "NEU"}</span>
                              </div>
                              <div className="text-[10px] text-slate-400 truncate">{p.title}</div>
                            </div>
                          </div>
                        ))}
                        {/* Placeholder slots for remaining personas */}
                        {Array.from({ length: Math.max(0, 12 - personaSuggestions.length) }).map((_, i) => (
                          <div key={"ph-" + i} className="flex gap-2.5 p-3 rounded-xl border border-dashed border-slate-700/30 bg-slate-800/20">
                            <div className="w-9 h-9 rounded-full bg-slate-800/60 animate-pulse flex-shrink-0" />
                            <div className="flex-1 space-y-1.5 py-1">
                              <div className="h-3 w-24 bg-slate-800/60 rounded animate-pulse" />
                              <div className="h-2.5 w-16 bg-slate-800/40 rounded animate-pulse" />
                            </div>
                          </div>
                        ))}
                      </div>
                    )}
                  </div>
                </div>
              </div>
            )}

            {/* Persona selection modal */}
            {showSuggestions && personaSuggestions.length > 0 && (
              <div className="fixed inset-0 bg-black/70 backdrop-blur-sm flex items-center justify-center z-50 anim-fade-fast p-4">
                <div className="bg-slate-900 rounded-2xl border border-slate-700/50 shadow-2xl w-full max-w-3xl flex flex-col" style={{ maxHeight: "88vh" }}>
                  {/* Modal header */}
                  <div className="flex items-center justify-between px-5 py-4 border-b border-slate-700/50 flex-shrink-0">
                    <div>
                      <h3 className="font-bold text-base text-slate-100">Choose Debate Personas</h3>
                      <p className="text-xs text-slate-400 mt-0.5">
                        <span className="text-emerald-400 font-semibold">{selectedSuggestions.size}</span> selected
                        <span className="text-slate-600 mx-1.5">·</span>
                        max 12 seats at the table
                      </p>
                    </div>
                    <div className="flex items-center gap-2">
                      <button onClick={() => setSelectedSuggestions(new Set(personaSuggestions.map((_, i) => i)))} className="text-[11px] text-emerald-400 hover:text-emerald-300 px-2.5 py-1.5 rounded-lg bg-emerald-500/10 hover:bg-emerald-500/20 transition-colors">All</button>
                      <button onClick={() => setSelectedSuggestions(new Set())} className="text-[11px] text-slate-400 hover:text-slate-300 px-2.5 py-1.5 rounded-lg bg-slate-700/50 hover:bg-slate-700 transition-colors">None</button>
                      <button onClick={() => setShowSuggestions(false)} className="ml-1 p-1.5 rounded-lg text-slate-500 hover:text-white hover:bg-slate-700/60 transition-colors"><IcoX size={15} /></button>
                    </div>
                  </div>
                  {/* Scrollable persona grid */}
                  <div className="flex-1 overflow-y-auto p-4">
                    <div className="grid grid-cols-2 gap-2">
                      {personaSuggestions.map((p, i) => (
                        <div key={i} onClick={() => setSelectedSuggestions(s => { const n = new Set(s); n.has(i) ? n.delete(i) : n.add(i); return n; })}
                          className={"flex gap-2.5 p-3 rounded-xl cursor-pointer transition-all border " + (selectedSuggestions.has(i) ? "bg-emerald-600/10 border-emerald-500/30" : "bg-slate-800/60 border-transparent hover:bg-slate-800 hover:border-slate-600/40")}>
                          <div className={"flex-shrink-0 w-4 h-4 mt-0.5 rounded border-2 flex items-center justify-center " + (selectedSuggestions.has(i) ? "bg-emerald-500 border-emerald-500" : "border-slate-500")}>
                            {selectedSuggestions.has(i) && <IcoCheck size={9} className="text-white" />}
                          </div>
                          {/* Avatar: real photo or colored initials */}
                          <div className="flex-shrink-0 w-9 h-9 rounded-full overflow-hidden border border-slate-600/40 bg-slate-700">
                            {p.imageUrl ? (
                              <img src={p.imageUrl} alt={p.name} className="w-full h-full object-cover" onError={e => { e.target.style.display="none"; e.target.nextSibling.style.display="flex"; }} />
                            ) : null}
                            <div className={"w-full h-full items-center justify-center text-[10px] font-bold text-white " + (p.imageUrl ? "hidden" : "flex")}
                              style={{ backgroundColor: p.side === "for" ? "#16a34a" : p.side === "against" ? "#dc2626" : "#475569" }}>
                              {p.name.split(" ").map(n => n[0]).join("").slice(0,2).toUpperCase()}
                            </div>
                          </div>
                          <div className="flex-1 min-w-0">
                            <div className="flex items-center gap-1.5 mb-0.5 flex-wrap">
                              <span className="text-xs font-semibold">{p.name}</span>
                              <span className={"text-[9px] px-1.5 py-0.5 rounded-full font-bold flex-shrink-0 " + (p.side === "for" ? "bg-green-500/20 text-green-400" : p.side === "against" ? "bg-red-500/20 text-red-400" : "bg-slate-600/50 text-slate-400")}>{p.side === "for" ? "FOR" : p.side === "against" ? "AGN" : "NEU"}</span>
                              {p.profileUrl && <a href={p.profileUrl} target="_blank" rel="noreferrer" onClick={e => e.stopPropagation()} className="text-[9px] text-blue-400 hover:text-blue-300 flex-shrink-0" title="Wikipedia">↗</a>}
                            </div>
                            <div className="text-[10px] text-slate-400 font-medium mb-0.5 truncate">{p.title}</div>
                            <div className="text-[10px] text-slate-500 leading-relaxed line-clamp-3">{p.instructions.slice(0,180)}…</div>
                          </div>
                        </div>
                      ))}
                    </div>
                  </div>
                  {/* Sticky footer */}
                  <div className="px-5 py-4 border-t border-slate-700/50 flex gap-3 flex-shrink-0 bg-slate-900/80">
                    <button onClick={() => setShowSuggestions(false)} className="px-5 py-2.5 rounded-xl bg-slate-700/60 hover:bg-slate-700 transition-all text-sm">Cancel</button>
                    <button onClick={addSelectedPersonas} disabled={selectedSuggestions.size === 0}
                      className="flex-1 py-2.5 rounded-xl bg-emerald-600/90 hover:bg-emerald-500 disabled:opacity-30 transition-all font-semibold text-sm">
                      {selectedSuggestions.size === 0 ? "Select personas to add" : "Add " + Math.min(selectedSuggestions.size, 16) + " Personas & Start Debate" + (selectedSuggestions.size > 16 ? " (capped at 16)" : "")}
                    </button>
                  </div>
                </div>
              </div>
            )}
          </div>
        );
      }

      // ═══════════════════════════════════════════
      // DEBATE PAGE
      // ═══════════════════════════════════════════
      if (page === "debate") {
        const debateConvMsgs = () => {
          const m = msgsRef.current.filter(x => !x.isSystem);
          if (m.length === 0) {
            return [{ role: "user", content: "The debate has just started on the topic: \"" + topic + "\". Give your opening statement — your core position and your single strongest argument for it." }];
          }
          const WINDOW = 20;
          const skipped = Math.max(0, m.length - WINDOW);
          const recent = m.slice(-WINDOW);
          const lastMsg = recent[recent.length - 1];
          const transcript = recent.map(x => "[" + x.name + "]: " + x.text).join("\n\n");
          const prefix = skipped > 0 ? "[" + skipped + " earlier messages omitted for brevity]\n\n" : "";
          // Find moderator message within last 12 messages so all speakers in this round see it
          let moderatorNote = "";
          const lookback = recent.slice(-18);
          for (let j = lookback.length - 1; j >= 0; j--) {
            if (lookback[j].isUser) {
              moderatorNote = "\n\nIMPORTANT — The moderator said: \"" + lookback[j].text + "\"\nYou MUST address the moderator's question or comment in your response.";
              break;
            }
          }
          const tail = lastMsg.isUser
            ? "The moderator just said: \"" + lastMsg.text + "\"\n\nYou MUST directly address the moderator's question or comment first, then continue the debate. Stay fully in character."
            : lastMsg.name + " just made the above argument. Directly respond to their specific points — refute, challenge, or build on them — then advance your own position. Stay fully in character." + moderatorNote;
          return [{ role: "user", content: prefix + "Debate transcript:\n\n" + transcript + "\n\n---\n\n" + tail }];
        };

        const debateSysPrompt = (seat, idx, side, liveRound, liveScore, liveHistory) => {
          const sideLabel = debateFormat === "sides" ? (side === "for" ? "FOR" : "AGAINST") : "neutral";
          const score = liveScore !== undefined ? liveScore : debateScore;
          const round = liveRound !== undefined ? liveRound : debateRound;
          const history = liveHistory !== undefined ? liveHistory : debateScoreHistory;
          const scoreHint = score < 50 ? "Currently AGAINST is winning (" + (100-score) + "%)" : score > 50 ? "Currently FOR is winning (" + score + "%)" : "Debate is currently tied";
          const lastScore = history.length > 0 ? history[history.length - 1].score : 50;
          return "You are " + seat.name + ", " + seat.title + ".\n\n" + seat.instructions + "\n\n" +
            "You are in a structured debate about: \"" + topic + "\"\n" +
            (debateFormat === "sides" ? "Your position: " + sideLabel + "\n" : "") +
            "Debate status: Round " + round + "\n" +
            scoreHint + " (last scored: " + lastScore + "/100)\n\n" +
            (contextRef.current ? "Debate context:\n" + contextRef.current + "\n\n" : "") +
            LENGTHS[answerLength].prompt + "\n\n" +
            "Make compelling, in-character arguments. Directly counter the previous speaker's specific points. Use evidence, logic, and your unique perspective.\n\nDo NOT prefix your response with your name.";
        };

        // Helper: get effective side for a seat (explicit override > index default)
        const getSeatSide = (seat, idx) => {
          if (seat && seat.side) return seat.side;
          return debateFormat === "sides" ? (idx < 8 ? "for" : "against") : "neutral";
        };

        // Cycle a seat's side override on click
        const cycleSeatSide = (i, e) => {
          e.stopPropagation();
          const sides = ["for", "against", "neutral"];
          const current = getSeatSide(seats[i], i);
          const next = sides[(sides.indexOf(current) + 1) % sides.length];
          const newSeats = [...seats];
          newSeats[i] = { ...newSeats[i], side: next };
          setSeats(newSeats);
        };

        const scoreDebate = async (roundNum) => {
          const nonSystemMsgs = msgsRef.current.filter(m => !m.isSystem);
          if (nonSystemMsgs.length === 0) return;
          if (scoringRef.current) return; // skip if a scoring call is already in-flight
          scoringRef.current = true;
          setScoringInProgress(true);
          const cfg = getAgentConfig(null);
          if (!cfg.apiKey) { scoringRef.current = false; setScoringInProgress(false); return; }
          try {
            // Use last 10 messages for scoring to keep it fast
            const recent = nonSystemMsgs.slice(-10);
            const transcript = recent.map(m => "[" + m.name + "]: " + m.text).join("\n\n");
            const prevScore = debateScoreRef.current;
            const history = debateHistoryRef.current;
            const historyStr = history.length > 0
              ? "\n\nScore history: " + history.slice(-5).map(h => "Round " + h.round + ": " + h.score + "% FOR (" + h.reason + ")").join("; ")
              : "";
            const ctxStr = contextRef.current ? "\n\nDebate context summary:\n" + contextRef.current.slice(0, 500) : "";
            const prompt = "Debate topic: \"" + topic + "\"\nCurrent score: " + prevScore + "% FOR / " + (100 - prevScore) + "% AGAINST" +
              historyStr + ctxStr +
              "\n\nBased on the RECENT messages below, adjust the score. The score should move incrementally — large swings only if a speaker made a truly devastating argument. Scale: 0=fully AGAINST, 100=fully FOR, 50=tied.\n\nReturn JSON: {\"score\": number, \"reason\": \"string (1 sentence explaining what shifted)\"}";
            const result = await callAPI(cfg.apiKey, cfg.baseUrl, cfg.model,
              "You are a neutral debate judge. Evaluate arguments objectively. The score should evolve gradually based on new arguments, not be re-decided from scratch each time. Reply with only valid JSON.",
              [{ role: "user", content: prompt + "\n\nRecent transcript:\n" + transcript }], 200);
            let parsed = { score: 50, reason: "" };
            try {
              const clean = result.replace(/```[a-z]*\n?/gi, "").replace(/```/g, "").trim();
              parsed = JSON.parse(clean);
            } catch (_) { const m = result.match(/\d+/); parsed.score = m ? parseInt(m[0]) : 50; parsed.reason = result.slice(0, 80); }
            const newScore = Math.max(0, Math.min(100, Math.round(parsed.score || 50)));
            setDebateScore(newScore);
            debateScoreRef.current = newScore;
            setDebateScoreHistory(h => {
              const entry = { round: roundNum !== undefined ? roundNum : h.length + 1, score: newScore, reason: parsed.reason || "" };
              const updated = [...h, entry];
              debateHistoryRef.current = updated;
              return updated;
            });
          } catch (e) { console.error("scoreDebate failed:", e.message); }
          scoringRef.current = false;
          setScoringInProgress(false);
        };


        // Auto-build debate context after each round (or every few manual messages)
        const updateDebateContext = async (roundNum) => {
          const cfg = getAgentConfig(null);
          if (!cfg.apiKey) return;
          const nonSystem = msgsRef.current.filter(m => !m.isSystem);
          if (nonSystem.length === 0) return;
          setUpdatingContext(true);
          try {
            const recent = nonSystem.slice(-20);
            const transcript = recent.map(m => "[" + m.name + "]: " + m.text).join("\n\n");
            const parts = occupied.map(s => {
              const side = getSeatSide(s, s.idx);
              return s.name + " (" + s.title + ", " + side.toUpperCase() + ")";
            }).join(", ");
            const score = debateScoreRef.current;
            const scoreLabel = score > 55 ? "FOR leading (" + score + "%)" : score < 45 ? "AGAINST leading (" + (100-score) + "%)" : "Tied (" + score + "%)";
            const text = await callAPI(cfg.apiKey, cfg.baseUrl, cfg.model,
              "You are a debate analyst. Update the running debate context document. Be concise and structured. Max 250 words.",
              [{ role: "user", content: "Debate topic: \"" + topic + "\"\nFormat: " + (debateFormat === "sides" ? "FOR vs AGAINST" : "Free-form") +
                "\nRound: " + roundNum + " of " + debateTotalRounds +
                "\nScore: " + scoreLabel +
                "\nParticipants: " + parts +
                (contextRef.current ? "\n\nPrevious context:\n" + contextRef.current : "") +
                "\n\nRecent transcript:\n" + transcript +
                "\n\nGenerate an updated debate context covering: strongest arguments made so far per side, key rebuttals, unaddressed points, and the current momentum." }], 500);
            setContext(text);
          } catch (e) { console.error("Debate context update failed:", e.message); setError("Context update failed: " + e.message); }
          setUpdatingContext(false);
        };

        const debateSpeak = async (si) => {
          const seat = seats[si];
          if (!seat || !topic) { setError(!topic ? "Set a debate topic" : ""); return; }
          const cfg = getAgentConfig(seat);
          if (!cfg.apiKey) { setError("Set API key for " + (PROVIDERS[cfg.baseUrl]?.label || "provider") + " in Settings"); return; }
          setError(""); setLoading(true); setLoadingSeat(si);
          const side = getSeatSide(seat, si);
          const sys = debateSysPrompt(seat, si, side, debateRound, debateScoreRef.current, debateHistoryRef.current);
          const conv = debateConvMsgs();
          const temp = seat.temperature !== undefined ? seat.temperature : DEFAULT_TEMP;
          const msg = { seatIndex: si, name: seat.name, text: "", isUser: false, time: new Date().toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" }) };
          addMessage(msg);
          try {
            await callAPIStream(cfg.apiKey, cfg.baseUrl, cfg.model, sys, conv, LENGTHS[answerLength].tokens, temp, updateLastMessage);
          } catch (e) {
            try {
              const text = await callAPI(cfg.apiKey, cfg.baseUrl, cfg.model, sys, conv, LENGTHS[answerLength].tokens, temp);
              updateLastMessage(text);
            } catch (e2) { undoMessage(); setError("API Error: " + e2.message); }
          }
          setLoading(false); setLoadingSeat(null);
          scoreDebate(); // fire-and-forget — score bar updates in background
          // Auto-update context every 3 manual messages
          const nonSysMsgCount = msgsRef.current.filter(m => !m.isSystem).length;
          if (nonSysMsgCount > 0 && nonSysMsgCount % 3 === 0) updateDebateContext(debateRound);
        };

        const debateRoundAuto = async () => {
          if (occupied.length === 0) return;
          // Run N additional rounds from current position
          const roundsToRun = debateTotalRounds;
          let round = debateRound;
          const target = round + roundsToRun;
          debateRunningRef.current = true;
          setDebateRunning(true);
          while (round < target && debateRunningRef.current) {
            round++;
            setDebateRound(round);
            for (const s of occupied) {
              if (!debateRunningRef.current) break;
              setLoadingSeat(s.idx);
              const cfg = getAgentConfig(seats[s.idx]);
              if (!cfg.apiKey) { setError("Set API key for " + (PROVIDERS[cfg.baseUrl]?.label || "provider")); debateRunningRef.current = false; break; }
              const side = getSeatSide(seats[s.idx], s.idx);
              const sys = debateSysPrompt(seats[s.idx], s.idx, side, round, debateScoreRef.current, debateHistoryRef.current);
              const conv = debateConvMsgs();
              const temp = seats[s.idx].temperature !== undefined ? seats[s.idx].temperature : DEFAULT_TEMP;
              const msg = { seatIndex: s.idx, name: s.name, text: "", isUser: false, time: new Date().toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" }) };
              addMessage(msg);
              try {
                await callAPIStream(cfg.apiKey, cfg.baseUrl, cfg.model, sys, conv, LENGTHS[answerLength].tokens, temp, updateLastMessage);
              } catch (e) {
                try {
                  const text = await callAPI(cfg.apiKey, cfg.baseUrl, cfg.model, sys, conv, LENGTHS[answerLength].tokens, temp);
                  updateLastMessage(text);
                } catch (_) { debateRunningRef.current = false; break; }
              }
              // Score after every message — fire-and-forget so it doesn't block next speaker
              scoreDebate(round);
            }
            setLoadingSeat(null);
            if (!debateRunningRef.current) break;
            // Auto-build debate context at end of each round (skip last — handled after loop)
            if (round < target && debateRunningRef.current) {
              await updateDebateContext(round);
              await new Promise(r => setTimeout(r, 200));
            }
          }
          // Always update context after the final round completes
          if (msgsRef.current.filter(m => !m.isSystem).length > 0) {
            await updateDebateContext(round);
          }
          debateRunningRef.current = false;
          setDebateRunning(false);
        };

        const finishDebate = async () => {
          const cfg = getAgentConfig(null);
          if (!cfg.apiKey) { setError("Set API key"); return; }
          // Stop any running debate loop
          debateRunningRef.current = false;
          setDebateRunning(false);
          setLoading(true); setGeneratingSummary(true); setError("");
          try {
            const transcript = msgsRef.current.filter(m => !m.isSystem).map(m => "[" + m.name + "]: " + m.text).join("\n\n");
            const parts = occupied.map(s => s.name + " (" + s.title + ")").join(", ");
            const finalScore = debateScoreRef.current;
            const winner = finalScore > 55 ? "FOR (YES)" : finalScore < 45 ? "AGAINST (NO)" : "Neutral / Draw";
            // Build score movement narrative from history — use ref for freshest data
            const liveHistory = debateHistoryRef.current;
            const scoreMoves = liveHistory.length > 0
              ? liveHistory.map((h, i) => {
                  const prev = i === 0 ? 50 : liveHistory[i - 1].score;
                  const delta = h.score - prev;
                  const dir = delta > 0 ? "▲ FOR +" + delta : delta < 0 ? "▼ AGAINST +" + Math.abs(delta) : "— No change";
                  return "Round " + h.round + ": " + dir + " pts → score " + h.score + " | " + (h.reason || "");
                }).join("\n")
              : "No scoring history available.";
            const prompt = `Generate a debate analysis report in clean Markdown. Topic: "${topic}"
Format: ${debateFormat === "sides" ? "FOR vs AGAINST" : "Free-form"}
Participants: ${parts}
Rounds: ${debateScoreHistory.length}
Final Score: ${finalScore}/100 → Winner: **${winner}**

Score movement per round (50=neutral, higher=FOR winning):
${scoreMoves}

Write the report with these sections using proper Markdown headers (##):

## 1. Result
Winner, final score, margin of victory (1-2 sentences).

## 2. Score Movement — What Moved the Needle
For each round: which specific argument shifted the score, by how many points, and why it was persuasive. Use a table: | Round | Argument | Points Moved | Direction |

## 3. Key Arguments — FOR side
Table: | # | Argument | Strength Assessment |

## 4. Key Arguments — AGAINST side
Table: | # | Argument | Strength Assessment |

## 5. Turning Points
2-3 specific moments that changed the debate's direction.

## 6. Final Verdict
1 paragraph: overall quality of debate, who debated better and why.`;
            const summary = await callAPI(cfg.apiKey, cfg.baseUrl, cfg.model,
              "You are a professional debate analyst. Write clear, structured Markdown. Do not use raw HTML.",
              [{ role: "user", content: prompt + "\n\nFull transcript:\n" + transcript }], 2500);
            setDebateSummary(summary);
            const liveMsgs = msgsRef.current.filter(m => !m.isSystem);
            const tokenApprox = Math.round((liveMsgs.reduce((a, m) => a + m.text.length / 4, 0)) + (summary.length / 4));
            const stats = { roundsCompleted: liveHistory.length, totalMessages: liveMsgs.length, approxTokens: tokenApprox, finalScore };
            setDebateStats(stats);
            setDebateIsFinished(true);
            setDebateFinished(true);
            // Sync state before saving
            setDebateScore(finalScore);
            setDebateScoreHistory(liveHistory);
            // Auto-save with finished flag and summary baked in
            const saveName = currentSaveName || topic || ("Debate " + new Date().toLocaleDateString());
            const finishedState = { seats, messages: msgsRef.current, topic, tableTheme, agenda, activeAgendaIdx, context, simMode, debateFormat, debateSide, debateScore: finalScore, debateScoreHistory: liveHistory, debateRound, debateTotalRounds, finished: true, debateSummary: summary, debateStats: stats };
            await fetch("/api/saves", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ name: saveName, state: finishedState }) });
            setCurrentSaveName(saveName); refreshConversations();
          } catch (e) { setError("Summary error: " + e.message); }
          setLoading(false); setGeneratingSummary(false);
        };

        return (
          <div className="h-screen bg-gradient-to-br from-slate-950 via-slate-900 to-slate-950 text-slate-100 flex flex-col overflow-hidden">
            {/* Full Top Nav Bar */}
            <div className="flex items-center gap-2 px-3 py-2 bg-slate-800/60 border-b border-slate-700/40 backdrop-blur flex-shrink-0">
              <button onClick={() => setPage("home")} className="p-1.5 rounded-lg hover:bg-slate-700/60 text-slate-400 transition-colors flex-shrink-0" title="Home"><IcoArrow size={16} /></button>
              <input type="text" value={topic} onChange={e => setTopic(e.target.value)} placeholder="Debate topic..."
                className="flex-1 bg-slate-700/40 rounded-lg px-3 py-1.5 text-sm placeholder-slate-500 outline-none focus:ring-1 focus:ring-emerald-500/40 min-w-0 font-semibold" />
              <select value={answerLength} onChange={e => setAnswerLength(e.target.value)} className="bg-slate-700/60 rounded-lg px-2 py-1.5 text-xs outline-none flex-shrink-0 cursor-pointer">
                {Object.entries(LENGTHS).map(([k,v]) => <option key={k} value={k}>{v.label}</option>)}
              </select>
              <div className="flex items-center gap-1 flex-shrink-0">
                {Object.entries(TABLE_THEMES).map(([k,t]) => (
                  <button key={k} onClick={() => setTableTheme(k)} title={t.label}
                    className={"w-4 h-4 rounded-full border-2 transition-all " + (tableTheme===k ? "border-white scale-110" : "border-transparent opacity-50 hover:opacity-100")}
                    style={{ backgroundColor: t.felt[0] }} />
                ))}
              </div>
              <div className="flex items-center gap-0.5 flex-shrink-0 border-l border-slate-700/40 pl-2 ml-1">
                <button onClick={() => setShowContext(!showContext)}
                  className={"p-1.5 rounded-lg transition-colors " + (showContext ? "bg-cyan-600/30 text-cyan-400" : "hover:bg-slate-700/60 text-slate-400 hover:text-cyan-400")} title="Debate Context"><IcoBook size={15} /></button>
                <button onClick={() => { setSaveName(currentSaveName || topic || ""); setShowSaveModal(true); }}
                  className="p-1.5 rounded-lg hover:bg-slate-700/60 text-slate-400 hover:text-emerald-400 transition-colors" title="Save"><IcoSave size={15} /></button>
                <div className="relative">
                  <button onClick={() => setShowExportMenu(!showExportMenu)} disabled={!messages.length}
                    className="p-1.5 rounded-lg hover:bg-slate-700/60 text-slate-400 hover:text-blue-400 disabled:opacity-30 transition-colors" title="Export"><IcoDownload size={15} /></button>
                  {showExportMenu && (
                    <div className="absolute right-0 top-8 z-50 bg-slate-800 border border-slate-700 rounded-xl shadow-xl py-1 w-36 anim-fade-fast">
                      <button onClick={() => exportConversation("md")} className="w-full px-3 py-2 text-left text-xs hover:bg-slate-700/60 flex items-center gap-2"><IcoFile size={12} /> Markdown (.md)</button>
                      <button onClick={() => exportConversation("json")} className="w-full px-3 py-2 text-left text-xs hover:bg-slate-700/60 flex items-center gap-2"><IcoFile size={12} /> JSON (.json)</button>
                    </div>
                  )}
                </div>
                <button onClick={() => { setMessages([]); msgsRef.current = []; undoStack.current = []; setCanUndo(false); setDebateRound(0); setDebateScore(50); setDebateScoreHistory([]); }} disabled={loading || !messages.length}
                  className="p-1.5 rounded-lg hover:bg-slate-700/60 text-slate-400 disabled:opacity-30 flex-shrink-0" title="Clear chat"><IcoTrash size={15} /></button>
              </div>
              {debateIsFinished ? (
                <button onClick={() => setDebateFinished(true)} className="flex items-center gap-1.5 px-3 py-1.5 rounded-lg bg-emerald-700/60 text-emerald-300 text-xs font-semibold flex-shrink-0 border border-emerald-600/30">
                  ✓ Concluded — View Summary
                </button>
              ) : (
                <button onClick={finishDebate} disabled={loading || messages.length === 0}
                  className="flex items-center gap-1 px-3 py-1.5 rounded-lg bg-amber-600/90 hover:bg-amber-500 disabled:opacity-30 text-xs font-semibold transition-colors flex-shrink-0">
                  {generatingSummary ? <><span className="animate-spin inline-block">⟳</span> Analyzing...</> : <><IcoFile size={13} /> Finish</>}
                </button>
              )}
            </div>

            {/* Score Bar */}
            <div className="px-3 pt-2 flex-shrink-0">
