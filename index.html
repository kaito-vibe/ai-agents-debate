                  )}
                  <div className="flex gap-2 mt-4">
                    {seats[editingSeat] && <button onClick={() => removeSeat(editingSeat)} className="px-3 py-2 rounded-lg bg-red-500/15 text-red-400 hover:bg-red-500/25 text-sm">Remove</button>}
                    <div className="flex-1" />
                    <button onClick={() => setEditingSeat(null)} className="px-4 py-2 rounded-lg bg-slate-700 hover:bg-slate-600 text-sm">Cancel</button>
                    <button onClick={saveSeat} disabled={!editForm.name.trim()} className="px-4 py-2 rounded-lg bg-emerald-600 hover:bg-emerald-500 disabled:opacity-30 text-sm font-semibold">Save</button>
                  </div>
                </div>
              </div>
            )}
          </div>
        );
      }

      // ═══════════════════════════════════════════
      // MEETING ROOM PAGE
      // ═══════════════════════════════════════════

      const SeatCard = ({ idx }) => {
        const seat = seats[idx]; const c = COLORS[idx]; const active = loadingSeat === idx;
        const pickerOpen = speakPicker === idx;
        return (
          <div onClick={() => openEdit(idx)}
            style={{ borderColor: seat ? (active ? c.ring : "transparent") : undefined, background: seat ? "linear-gradient(135deg, #1e293b, #0f172a)" : undefined }}
            className={"cursor-pointer rounded-2xl p-3 transition-all duration-300 border-2 relative " + (seat ? "hover:scale-[1.02] shadow-lg" : "border-dashed border-slate-600 bg-slate-800/30 hover:bg-slate-800/50") + (active ? " scale-[1.03] shadow-xl" : "")}>
            {seat ? (
              <div className="space-y-2">
                <div className="flex items-center gap-2.5">
                  <div className="w-9 h-9 rounded-full flex items-center justify-center text-white text-xs font-bold shadow-md flex-shrink-0" style={{ backgroundColor: c.initBg }}>
                    {seat.name.split(" ").map(n => n[0]).join("").slice(0, 2).toUpperCase()}
                  </div>
                  <div className="min-w-0 flex-1">
                    <div className="text-sm font-semibold text-slate-100 truncate">{seat.name}</div>
                    <div className="text-[11px] text-slate-400 truncate">{seat.title}</div>
                  </div>
                </div>
                {active ? (
                  <div className="flex items-center justify-center gap-1.5 py-2">
                    <div className="flex gap-1">{[0,1,2].map(d => <div key={d} className="w-1.5 h-1.5 rounded-full animate-bounce" style={{ backgroundColor: c.ring, animationDelay: d*0.15+"s" }} />)}</div>
                    <span className="text-xs text-slate-400 ml-1">Speaking...</span>
                  </div>
                ) : (
                  <div className="relative" onClick={e => e.stopPropagation()}>
                    <button onClick={() => setSpeakPicker(pickerOpen ? null : idx)} disabled={loading}
                      className="w-full py-1.5 rounded-lg text-xs font-semibold text-white transition-all hover:brightness-110 disabled:opacity-30 shadow-sm" style={{ backgroundColor: c.ring }}>
                      Ask to Speak
                    </button>
                    {pickerOpen && (
                      <div className="absolute left-0 right-0 mt-1 z-50 bg-slate-800 border border-slate-600/60 rounded-xl shadow-2xl p-1 anim-fade-fast">
                        <div className="text-[9px] text-slate-500 uppercase tracking-wider px-2 pt-1 pb-0.5">Response length</div>
                        {LENGTH_KEYS.map(k => (
                          <button key={k} onClick={() => speak(idx, k)}
                            className={"w-full flex items-center gap-2 px-2.5 py-2 rounded-lg text-left transition-colors " + (k === answerLength ? "bg-slate-700/80" : "hover:bg-slate-700/50")}>
                            <div className="w-2.5 h-2.5 rounded-full flex-shrink-0" style={{ backgroundColor: LENGTH_COLORS[k] }} />
                            <span className="text-xs font-semibold text-slate-200">{LENGTHS[k].label}</span>
                            <span className="text-[10px] text-slate-500 ml-auto">{k === "mini" ? "~250ch" : LENGTHS[k].tokens + "tok"}</span>
                          </button>
                        ))}
                      </div>
                    )}
                  </div>
                )}
              </div>
            ) : (
              <div className="flex flex-col items-center justify-center py-4 text-slate-500 gap-1"><IcoPlus size={22} /><span className="text-xs">Add Person</span></div>
            )}
          </div>
        );
      };

      return (
        <div className="h-screen bg-gradient-to-br from-slate-950 via-slate-900 to-slate-950 text-slate-100 flex flex-col overflow-hidden">
          {/* Header */}
          <div className="flex items-center gap-2 px-3 py-2 bg-slate-800/60 border-b border-slate-700/40 backdrop-blur flex-shrink-0">
            <button onClick={() => setPage("home")} className="p-1.5 rounded-lg hover:bg-slate-700/60 text-slate-400 transition-colors flex-shrink-0" title="Home"><IcoArrow size={16} /></button>
            <input type="text" value={topic} onChange={e => setTopic(e.target.value)} placeholder="Meeting topic..."
              className="flex-1 bg-slate-700/40 rounded-lg px-3 py-1.5 text-sm placeholder-slate-500 outline-none focus:ring-1 focus:ring-emerald-500/40 min-w-0" />
            {agenda.length === 0 && (
              <div className="flex items-center gap-1 flex-shrink-0">
                <input type="text" value={agendaInput} onChange={e => setAgendaInput(e.target.value)} onKeyDown={e => e.key==="Enter" && addAgendaItem()}
                  placeholder="+ Agenda item" className="w-28 bg-slate-700/30 rounded-lg px-2 py-1.5 text-xs placeholder-slate-600 outline-none focus:w-40 transition-all" />
              </div>
            )}
            <select value={answerLength} onChange={e => setAnswerLength(e.target.value)} className="bg-slate-700/60 rounded-lg px-2 py-1.5 text-xs outline-none flex-shrink-0 cursor-pointer">
              {Object.entries(LENGTHS).map(([k,v]) => <option key={k} value={k}>{v.label}</option>)}
            </select>
            <div className="flex items-center gap-1 flex-shrink-0">
              {Object.entries(TABLE_THEMES).map(([k,t]) => (
                <button key={k} onClick={() => setTableTheme(k)} title={t.label}
                  className={"w-4 h-4 rounded-full border-2 transition-all " + (tableTheme===k ? "border-white scale-110" : "border-transparent opacity-50 hover:opacity-100")}
                  style={{ backgroundColor: t.felt[0] }} />
              ))}
            </div>
            <div className="flex items-center gap-0.5 flex-shrink-0 border-l border-slate-700/40 pl-2 ml-1">
              <button onClick={() => setShowContext(!showContext)}
                className={"p-1.5 rounded-lg transition-colors " + (showContext ? "bg-cyan-600/30 text-cyan-400" : "hover:bg-slate-700/60 text-slate-400 hover:text-cyan-400")} title="Meeting Context"><IcoBook size={15} /></button>
              <button onClick={() => { setSaveName(currentSaveName || topic || ""); setShowSaveModal(true); }}
                className="p-1.5 rounded-lg hover:bg-slate-700/60 text-slate-400 hover:text-emerald-400 transition-colors" title="Save"><IcoSave size={15} /></button>
              <div className="relative">
                <button onClick={() => setShowExportMenu(!showExportMenu)} disabled={!messages.length}
                  className="p-1.5 rounded-lg hover:bg-slate-700/60 text-slate-400 hover:text-blue-400 disabled:opacity-30 transition-colors" title="Export"><IcoDownload size={15} /></button>
                {showExportMenu && (
                  <div className="absolute right-0 top-8 z-50 bg-slate-800 border border-slate-700 rounded-xl shadow-xl py-1 w-36 anim-fade-fast">
                    <button onClick={() => exportConversation("md")} className="w-full px-3 py-2 text-left text-xs hover:bg-slate-700/60 flex items-center gap-2"><IcoFile size={12} /> Markdown (.md)</button>
                    <button onClick={() => exportConversation("json")} className="w-full px-3 py-2 text-left text-xs hover:bg-slate-700/60 flex items-center gap-2"><IcoFile size={12} /> JSON (.json)</button>
                  </div>
                )}
              </div>
              <button onClick={() => { setMessages([]); msgsRef.current = []; undoStack.current = []; setCanUndo(false); }} disabled={loading || !messages.length}
                className="p-1.5 rounded-lg hover:bg-slate-700/60 text-slate-400 disabled:opacity-30 flex-shrink-0" title="Clear chat"><IcoTrash size={15} /></button>
            </div>
            <button onClick={genMinutes} disabled={loading || !messages.length}
              className="flex items-center gap-1 px-3 py-1.5 rounded-lg bg-amber-600/90 hover:bg-amber-500 disabled:opacity-30 text-xs font-semibold transition-colors flex-shrink-0">
              <IcoFile size={13} /> Minutes
            </button>
          </div>

          {error && (
            <div className="mx-3 mt-2 px-3 py-1.5 rounded-lg bg-red-500/15 border border-red-500/20 text-red-300 text-xs flex items-center justify-between flex-shrink-0">
              <span>{error}</span><button onClick={() => setError("")} className="ml-2"><IcoX size={12} /></button>
            </div>
          )}

          {/* Context Panel */}
          {showContext && (
            <div className="mx-3 mt-2 flex-shrink-0 anim-fade-fast">
              <div className="rounded-xl bg-slate-800/70 border border-cyan-500/20 overflow-hidden">
                <div className="flex items-center justify-between px-3 py-2 bg-cyan-500/10 border-b border-cyan-500/15">
                  <div className="flex items-center gap-2">
                    <IcoBook size={14} className="text-cyan-400" />
                    <span className="text-xs font-semibold text-cyan-300">Meeting Context</span>
                    {context && <span className="text-[10px] text-slate-500">({context.length} chars)</span>}
                  </div>
                  <div className="flex items-center gap-1.5">
                    <button onClick={() => setAutoUpdateContext(!autoUpdateContext)} title="Auto-update after each round"
                      className={"flex items-center gap-1 text-[10px] px-2 py-0.5 rounded-lg transition-all " + (autoUpdateContext ? "bg-emerald-600/30 text-emerald-300" : "bg-slate-700/40 text-slate-500 hover:text-slate-300")}>
                      Auto {autoUpdateContext ? "ON" : "OFF"}
                    </button>
                    <button onClick={updateContextAI} disabled={updatingContext || loading || !apiKey || messages.length === 0}
                      className="flex items-center gap-1 text-[11px] px-2.5 py-1 rounded-lg bg-purple-500/20 text-purple-300 hover:bg-purple-500/30 disabled:opacity-30 transition-all">
                      <IcoSparkles size={11} /> {updatingContext ? "Updating..." : "AI Update"}
                    </button>
                    <button onClick={() => setShowContext(false)} className="p-1 rounded-lg text-slate-500 hover:text-white transition-colors"><IcoX size={13} /></button>
                  </div>
                </div>
                <textarea value={context} onChange={e => setContext(e.target.value)}
                  placeholder="Add meeting context, background info, or brief here. This will be shared with all participants and can be updated by AI during the discussion..."
                  rows={4} className="w-full bg-transparent px-3 py-2.5 text-sm text-slate-300 placeholder-slate-600 outline-none resize-y min-h-[80px] max-h-[200px]" />
              </div>
            </div>
          )}

          {/* Agenda Bar */}
          {agenda.length > 0 && (
            <div className="px-3 pt-2 flex-shrink-0">
              <div className="flex items-center gap-1.5 overflow-x-auto pb-1" style={{ scrollbarWidth: "none" }}>
                <span className="text-[10px] text-slate-500 uppercase tracking-wider flex-shrink-0 mr-1">Agenda:</span>
                {agenda.map((item, i) => (
                  <button key={i} onClick={() => switchAgendaItem(i)}
                    className={"flex items-center gap-1 px-2.5 py-1 rounded-lg text-xs whitespace-nowrap transition-all flex-shrink-0 " +
                      (i === activeAgendaIdx ? "bg-emerald-600/80 text-white font-semibold" : "bg-slate-700/40 text-slate-400 hover:bg-slate-700/60")}>
                    <span className="opacity-50">{i+1}.</span> {item.text}
                    <span onClick={e => { e.stopPropagation(); removeAgendaItem(i); }} className="ml-1 opacity-0 hover:opacity-100 text-slate-500 hover:text-red-400 transition-opacity">&times;</span>
                  </button>
                ))}
                <div className="flex items-center gap-1 flex-shrink-0">
                  <input type="text" value={agendaInput} onChange={e => setAgendaInput(e.target.value)} onKeyDown={e => e.key==="Enter" && addAgendaItem()}
                    placeholder="+ Add item" className="w-24 bg-slate-700/30 rounded-lg px-2 py-1 text-xs placeholder-slate-600 outline-none focus:w-40 transition-all" />
                </div>
              </div>
            </div>
          )}

          {/* Poker Table */}
          <div className="flex-1 flex items-center justify-center p-3 overflow-hidden">
            <div className="w-full max-w-6xl h-full flex gap-3 items-stretch">
              <div className="flex flex-col gap-3 justify-around w-44 flex-shrink-0">{[0,1,2].map(i => <SeatCard key={i} idx={i} />)}</div>
              <div className="flex-1 flex flex-col overflow-hidden rounded-[2.5rem] border-[6px] shadow-2xl transition-all duration-500"
                style={{ borderColor: th.rim, background: "radial-gradient(ellipse at 50% 40%, "+th.felt[0]+" 0%, "+th.felt[1]+" 50%, "+th.felt[2]+" 100%)", boxShadow: "inset 0 2px 20px rgba(0,0,0,0.3), 0 8px 40px rgba(0,0,0,0.4)" }}>
                <div ref={chatRef} className="flex-1 overflow-y-auto p-4 space-y-2.5">
                  {messages.length === 0 ? (
                    <div className="flex items-center justify-center h-full">
                      <div className="text-center space-y-2" style={{ color: "rgba(255,255,255,0.15)" }}>
                        <IcoUsers size={36} className="mx-auto" />
                        <p className="text-sm">{topic ? "Click \"Ask to Speak\" on any participant" : "Set a topic and add participants to begin"}</p>
                      </div>
                    </div>
                  ) : messages.map((m, i) => {
                    if (m.isSystem) {
                      return (
                        <div key={i} className="flex justify-center anim-fade">
                          <div className="px-4 py-1.5 rounded-full bg-amber-500/15 border border-amber-500/20 text-amber-300/80 text-xs font-medium flex items-center gap-1.5">
                            <IcoFile size={12} /> {m.text}
                          </div>
                        </div>
                      );
                    }
                    const c = m.seatIndex >= 0 ? COLORS[m.seatIndex] : null;
                    return (
                      <div key={i} className={"flex " + (m.isUser ? "justify-end" : "justify-start") + " anim-fade"}>
                        <div className={"max-w-[75%] rounded-2xl px-3.5 py-2.5 " + (m.isUser ? "bg-slate-500/30 rounded-br-md" : "bg-black/25 rounded-bl-md")}
                          style={{ borderLeft: !m.isUser ? "3px solid "+(c?.ring||"#666") : undefined, borderRight: m.isUser ? "3px solid #64748b" : undefined }}>
                          <div className="flex items-center gap-1.5 mb-1">
                            {!m.isUser && <div className="w-5 h-5 rounded-full text-[9px] flex items-center justify-center text-white font-bold flex-shrink-0" style={{ backgroundColor: c?.ring }}>{m.name[0]}</div>}
                            <span className="text-[11px] font-bold" style={{ color: m.isUser ? "#94a3b8" : c?.ring }}>{m.name}</span>
                            <span className="text-[9px]" style={{ color: "rgba(255,255,255,0.15)" }}>{m.time}</span>
                          </div>
                          <p className="text-[13px] leading-relaxed" style={{ color: "rgba(255,255,255,0.8)" }}>{m.text || <span className="opacity-30">...</span>}</p>
                        </div>
                      </div>
                    );
                  })}
                </div>
                <div className="p-3 bg-black/15 flex-shrink-0" style={{ borderTop: "1px solid "+th.border }}>
                  <div className="flex gap-2">
                    <input type="text" value={userInput} onChange={e => setUserInput(e.target.value)}
                      onKeyDown={e => e.key==="Enter" && !e.shiftKey && sendUser()}
                      placeholder="Type your message as moderator..."
                      className="flex-1 rounded-xl px-3 py-2 text-sm placeholder-slate-400/30 outline-none focus:ring-1 focus:ring-white/20" style={{ backgroundColor: th.inputBg }} />
                    <button onClick={sendUser} disabled={!userInput.trim()} className="px-3 rounded-xl bg-emerald-600/80 hover:bg-emerald-500 disabled:opacity-20 transition-all"><IcoSend size={15} /></button>
                    <button onClick={undoMessage} disabled={loading || !canUndo}
                      className="px-2.5 rounded-xl bg-slate-600/50 hover:bg-slate-600 disabled:opacity-20 transition-all" title="Undo last message"><IcoUndo size={14} /></button>
                    <button onClick={feedbackRound} disabled={loading || occupied.length===0}
                      className="flex items-center gap-1.5 px-3 rounded-xl bg-purple-600/80 hover:bg-purple-500 disabled:opacity-20 text-xs font-semibold transition-all whitespace-nowrap">
                      <IcoRotate size={13} /> Round
                    </button>
                  </div>
                </div>
              </div>
              <div className="flex flex-col gap-3 justify-around w-44 flex-shrink-0">{[3,4,5].map(i => <SeatCard key={i} idx={i} />)}</div>
            </div>
          </div>

          {/* ── Seat Config Modal ── */}
          {editingSeat !== null && (
            <div className="fixed inset-0 bg-black/50 backdrop-blur-sm flex items-center justify-center z-50 anim-fade-fast" onClick={() => setEditingSeat(null)}>
              <div className="bg-slate-800 rounded-2xl p-5 w-full max-w-md mx-4 shadow-2xl border border-slate-700/50 max-h-[90vh] overflow-y-auto" onClick={e => e.stopPropagation()}>
                <div className="flex items-center justify-between mb-4">
                  <div className="flex items-center gap-2">
                    <div className="w-3 h-3 rounded-full" style={{ backgroundColor: COLORS[editingSeat].ring }} />
                    <h3 className="font-bold">Seat {editingSeat + 1}</h3>
                  </div>
                  <button onClick={() => setEditingSeat(null)} className="text-slate-400 hover:text-white"><IcoX size={18} /></button>
                </div>

                {personas.length > 0 && (
                  <div className="mb-4">
                    <button onClick={() => setShowPersonaPicker(!showPersonaPicker)}
                      className="flex items-center gap-1.5 text-xs text-blue-400 hover:text-blue-300 transition-colors mb-2">
                      <IcoUser size={13} /> {showPersonaPicker ? "Hide library" : "Choose from library (" + personas.length + ")"}
                    </button>
                    {showPersonaPicker && (
                      <div className="max-h-36 overflow-y-auto space-y-1 mb-2 bg-slate-900/40 rounded-xl p-2">
                        {personas.map(p => (
                          <button key={p.id} onClick={() => pickPersona(p)} className="w-full flex items-center gap-2 p-2 rounded-lg hover:bg-slate-700/60 text-left transition-colors">
                            <div className="w-7 h-7 rounded-full bg-emerald-600/30 flex items-center justify-center text-emerald-400 text-[10px] font-bold flex-shrink-0">
                              {p.name.split(" ").map(n=>n[0]).join("").slice(0,2).toUpperCase()}
                            </div>
                            <div className="min-w-0 flex-1"><div className="text-xs font-semibold truncate">{p.name}</div><div className="text-[10px] text-slate-500 truncate">{p.title}</div></div>
                          </button>
                        ))}
                      </div>
                    )}
                  </div>
                )}

                <div className="space-y-3">
                  <div><label className="text-[10px] text-slate-500 uppercase tracking-wider mb-1 block">Name</label>
                    <input type="text" value={editForm.name} onChange={e => setEditForm(f => ({...f, name: e.target.value}))}
                      placeholder="e.g. Sarah Chen" className="w-full bg-slate-700/60 rounded-lg px-3 py-2 text-sm outline-none focus:ring-1 focus:ring-emerald-500/30" /></div>
                  <div><label className="text-[10px] text-slate-500 uppercase tracking-wider mb-1 block">Title / Role</label>
                    <input type="text" value={editForm.title} onChange={e => setEditForm(f => ({...f, title: e.target.value}))}
                      placeholder="e.g. VP of Engineering" className="w-full bg-slate-700/60 rounded-lg px-3 py-2 text-sm outline-none focus:ring-1 focus:ring-emerald-500/30" /></div>
                  <div>
                    <div className="flex items-center justify-between mb-1">
                      <label className="text-[10px] text-slate-500 uppercase tracking-wider">Persona Instructions</label>
                      <button onClick={aiAssist} disabled={genInstr}
                        className="flex items-center gap-1 text-[11px] px-2 py-1 rounded-md bg-purple-500/20 text-purple-300 hover:bg-purple-500/30 disabled:opacity-40 transition-all">
                        <IcoSparkles size={11} /> {genInstr ? "Generating..." : "AI Assist"}
                      </button>
                    </div>
                    <textarea value={editForm.instructions} onChange={e => setEditForm(f => ({...f, instructions: e.target.value}))}
                      placeholder="Communication style, priorities, personality..." rows={4}
                      className="w-full bg-slate-700/60 rounded-lg px-3 py-2 text-sm outline-none resize-none focus:ring-1 focus:ring-emerald-500/30" />
                  </div>
                  <div>
                    <div className="flex items-center justify-between mb-1.5">
                      <label className="text-[10px] text-slate-500 uppercase tracking-wider">Temperature</label>
                      <span className="text-[11px] text-slate-400 font-mono">{editForm.temperature.toFixed(1)}</span>
                    </div>
                    <input type="range" min="0" max="2" step="0.1" value={editForm.temperature}
                      onChange={e => setEditForm(f => ({...f, temperature: parseFloat(e.target.value)}))} className="w-full" />
                    <div className="flex justify-between text-[9px] text-slate-600 mt-1"><span>Focused (0.0)</span><span>Balanced (0.7)</span><span>Creative (2.0)</span></div>
                    <p className="text-[10px] text-slate-600 mt-1.5 leading-relaxed">Controls response randomness. Lower values produce more consistent, predictable responses. Higher values produce more creative, varied, and sometimes surprising responses. Default is 0.7.</p>
                  </div>
                  <div>
                    <label className="text-[10px] text-slate-500 uppercase tracking-wider mb-1 block">Provider & Model</label>
                    <div className="flex gap-2">
                      <select value={editForm.provider || ""} onChange={e => { setEditForm(f => ({...f, provider: e.target.value, model: e.target.value ? PROVIDERS[e.target.value]?.default || "" : "" })); }} className="flex-1 bg-slate-700/60 rounded-lg px-2 py-2 text-xs outline-none cursor-pointer">
                        <option value="">Default ({PROVIDERS[defaultProvider]?.label})</option>
                        {Object.entries(PROVIDERS).map(([u, p]) => <option key={u} value={u}>{p.label}</option>)}
                      </select>
                      <select value={editForm.model || ""} onChange={e => setEditForm(f => ({...f, model: e.target.value}))} className="flex-1 bg-slate-700/60 rounded-lg px-2 py-2 text-xs outline-none cursor-pointer">
                        <option value="">Default</option>
                        {(PROVIDERS[editForm.provider || defaultProvider]?.models || []).map(m => <option key={m.value} value={m.value}>{m.label}</option>)}
                      </select>
                    </div>
                    <p className="text-[10px] text-slate-600 mt-1">Leave on Default to use the global setting, or pick a specific provider/model for this agent.</p>
                  </div>
                </div>
                {modalError && (
                  <div className="mt-3 px-3 py-2 rounded-lg bg-red-500/15 border border-red-500/25 text-red-300 text-xs flex items-center gap-2">
                    <span className="flex-1">{modalError}</span><button onClick={() => setModalError("")}><IcoX size={12} /></button>
                  </div>
                )}
                <div className="flex gap-2 mt-4">
                  {seats[editingSeat] && <button onClick={() => removeSeat(editingSeat)} className="px-3 py-2 rounded-lg bg-red-500/15 text-red-400 hover:bg-red-500/25 text-sm">Remove</button>}
                  <div className="flex-1" />
                  <button onClick={() => setEditingSeat(null)} className="px-4 py-2 rounded-lg bg-slate-700 hover:bg-slate-600 text-sm">Cancel</button>
                  <button onClick={saveSeat} disabled={!editForm.name.trim()} className="px-4 py-2 rounded-lg bg-emerald-600 hover:bg-emerald-500 disabled:opacity-30 text-sm font-semibold">Save</button>
                </div>
              </div>
            </div>
          )}

          {/* ── Save Modal ── */}
          {showSaveModal && (
            <div className="fixed inset-0 bg-black/50 backdrop-blur-sm flex items-center justify-center z-50 anim-fade-fast" onClick={() => setShowSaveModal(false)}>
              <div className="bg-slate-800 rounded-2xl p-5 w-full max-w-sm mx-4 shadow-2xl border border-slate-700/50" onClick={e => e.stopPropagation()}>
                <div className="flex items-center justify-between mb-4">
                  <h3 className="font-bold flex items-center gap-2"><IcoSave size={18} className="text-emerald-400" /> Save Conversation</h3>
                  <button onClick={() => setShowSaveModal(false)} className="text-slate-400 hover:text-white"><IcoX size={18} /></button>
                </div>
                <div><label className="text-[10px] text-slate-500 uppercase tracking-wider mb-1 block">Name</label>
                  <input type="text" value={saveName} onChange={e => setSaveName(e.target.value)}
                    onKeyDown={e => e.key==="Enter" && saveName.trim() && (saveConversation(saveName.trim()), setShowSaveModal(false))}
                    placeholder="e.g. Q1 Budget Review" autoFocus
                    className="w-full bg-slate-700/60 rounded-lg px-3 py-2 text-sm outline-none focus:ring-1 focus:ring-emerald-500/30" /></div>
                <div className="flex gap-2 mt-4 justify-end">
                  <button onClick={() => setShowSaveModal(false)} className="px-4 py-2 rounded-lg bg-slate-700 hover:bg-slate-600 text-sm">Cancel</button>
                  <button onClick={() => { saveConversation(saveName.trim()); setShowSaveModal(false); }} disabled={!saveName.trim()}
                    className="px-4 py-2 rounded-lg bg-emerald-600 hover:bg-emerald-500 disabled:opacity-30 text-sm font-semibold flex items-center gap-1.5">
                    <IcoSave size={14} /> Save
                  </button>
                </div>
              </div>
            </div>
          )}

          {/* ── Minutes Modal ── */}
          {showMinutes && (
            <div className="fixed inset-0 bg-black/50 backdrop-blur-sm flex items-center justify-center z-50 anim-fade-fast" onClick={() => setShowMinutes(false)}>
              <div className="bg-slate-800 rounded-2xl p-5 w-full max-w-2xl mx-4 shadow-2xl border border-slate-700/50 max-h-[85vh] flex flex-col" onClick={e => e.stopPropagation()}>
                <div className="flex items-center justify-between mb-3">
                  <h3 className="font-bold flex items-center gap-2"><IcoFile size={18} className="text-amber-400" /> Meeting Minutes</h3>
                  <button onClick={() => setShowMinutes(false)} className="text-slate-400 hover:text-white"><IcoX size={18} /></button>
                </div>
                <div className="flex-1 overflow-y-auto bg-slate-900/60 rounded-xl p-4 text-sm whitespace-pre-wrap leading-relaxed text-slate-300">{minutesText}</div>
                <button onClick={() => { navigator.clipboard.writeText(minutesText); setCopied(true); setTimeout(() => setCopied(false), 2000); }}
                  className="mt-3 px-4 py-2 rounded-lg bg-emerald-600 hover:bg-emerald-500 text-sm font-semibold self-end flex items-center gap-1.5">
                  {copied ? <><IcoCheck size={14} /> Copied!</> : <><IcoCopy size={14} /> Copy</>}
                </button>
              </div>
            </div>
          )}

          {/* Close popups on outside click */}
          {showExportMenu && <div className="fixed inset-0 z-40" onClick={() => setShowExportMenu(false)} />}
          {speakPicker !== null && <div className="fixed inset-0 z-40" onClick={() => setSpeakPicker(null)} />}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
